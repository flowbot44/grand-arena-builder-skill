name: Publish Data Feed

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      recovery_from:
        description: "Optional one-time recovery backfill start date (UTC, YYYY-MM-DD). Example: 2026-03-02"
        required: false
        default: ""
      recovery_to:
        description: "Optional one-time recovery backfill end date (UTC, YYYY-MM-DD). Defaults to today if omitted."
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: publish-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GRANDARENA_API_KEY: ${{ secrets.GRANDARENA_API_KEY }}
      SEED_DB_URL: ${{ secrets.SEED_DB_URL }}
      GRANDARENA_DB_PATH: state/grandarena.db
      FETCH_MATCH_PERFORMANCES: "false"
      CHAMPION_ONLY_MATCHES: "false"
      LOOKBEHIND_DAYS: "2"
      LOOKAHEAD_DAYS: "2"
      REQUEST_LIMIT_PER_MINUTE: "720"
      MIN_REQUEST_INTERVAL_SECONDS: "0.10"
      RECOVERY_FROM: ${{ github.event.inputs.recovery_from || '' }}
      RECOVERY_TO: ${{ github.event.inputs.recovery_to || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create Work Dirs
        run: mkdir -p state exports/data

      - name: Restore Prior DB Artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: publish-feed.yml
          workflow_conclusion: success
          name: grandarena-db-state
          path: state
          if_no_artifact_found: warn

      - name: Restore Prior Feed Artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: publish-feed.yml
          workflow_conclusion: success
          name: grandarena-feed-state
          path: exports
          if_no_artifact_found: warn

      - name: Unpack DB State
        run: |
          if [ -f state/grandarena.db.gz ]; then
            gunzip -f state/grandarena.db.gz
          fi

      - name: Backup Restored DB State
        uses: actions/upload-artifact@v6
        with:
          name: grandarena-db-state-backup-${{ github.run_id }}
          path: state/grandarena.db
          retention-days: 30
          if-no-files-found: ignore

      - name: Backup Restored Feed State
        uses: actions/upload-artifact@v6
        with:
          name: grandarena-feed-state-backup-${{ github.run_id }}
          path: exports/data
          retention-days: 30
          if-no-files-found: ignore

      - name: Seed DB If Missing
        run: |
          if [ ! -f state/grandarena.db ] && [ -n "${SEED_DB_URL:-}" ]; then
            echo "No prior artifact found. Seeding from SEED_DB_URL..."
            curl -fL "$SEED_DB_URL" -o state/seed.db.download
            if gzip -t state/seed.db.download 2>/dev/null; then
              gunzip -c state/seed.db.download > state/grandarena.db
            else
              mv state/seed.db.download state/grandarena.db
            fi
          fi

      - name: Bootstrap DB If Missing
        run: |
          if [ ! -f state/grandarena.db ]; then
            FROM_DATE="$(date -u -d '2 days ago' +%F)"
            TO_DATE="$(date -u +%F)"
            python -m app.ingest backfill --db state/grandarena.db --from "$FROM_DATE" --to "$TO_DATE"
          fi

      - name: Hourly Ingest
        if: ${{ env.RECOVERY_FROM == '' }}
        run: python -m app.ingest hourly --db state/grandarena.db

      - name: One-Time Recovery Backfill
        if: ${{ env.RECOVERY_FROM != '' }}
        run: |
          RECOVERY_END="${RECOVERY_TO:-$(date -u +%F)}"
          echo "Running one-time recovery backfill from ${RECOVERY_FROM} to ${RECOVERY_END} (UTC)"
          python -m app.ingest backfill --db state/grandarena.db --from "${RECOVERY_FROM}" --to "${RECOVERY_END}" --skip-metrics-recompute

      - name: Require Prior Feed State For Recovery Export
        if: ${{ env.RECOVERY_FROM != '' }}
        run: |
          if [ ! -f exports/data/latest.json ]; then
            echo "ERROR: Recovery export requires prior feed state at exports/data/latest.json"
            echo "Restore the previous grandarena-feed-state artifact before running manual recovery chunks."
            exit 1
          fi

      - name: Prune Rolling Window
        if: ${{ env.RECOVERY_FROM == '' }}
        run: python -m app.maintenance prune --db state/grandarena.db --keep-days 5

      - name: Export Moki Totals
        run: python -m app.export_moki_totals --out exports/data/moki_totals.json

      - name: Export Static Feed
        run: |
          if [ -n "${RECOVERY_FROM}" ]; then
            RECOVERY_END="${RECOVERY_TO:-$(date -u +%F)}"
            python -m app.export_feed \
              --db state/grandarena.db \
              --out exports/data \
              --days 30 \
              --lookahead-days 2 \
              --raw-refresh-start "${RECOVERY_FROM}" \
              --raw-refresh-end "${RECOVERY_END}" \
              --skip-cumulative
          else
            TODAY_UTC="$(date -u +%F)"
            RAW_REFRESH_START="$(date -u -d '2 days ago' +%F)"
            RAW_REFRESH_END="$(date -u -d '2 days' +%F)"
            if [ -f exports/data/latest.json ]; then
              python -m app.export_feed \
                --db state/grandarena.db \
                --out exports/data \
                --days 30 \
                --lookahead-days 2 \
                --raw-refresh-start "${RAW_REFRESH_START}" \
                --raw-refresh-end "${RAW_REFRESH_END}" \
                --cumulative-mutable-days-back 2
            else
              python -m app.export_feed \
                --db state/grandarena.db \
                --out exports/data \
                --days 30 \
                --lookahead-days 2 \
                --mutable-days-back 2 \
                --mutable-days-forward 2 \
                --cumulative-mutable-days-back 2
            fi
          fi

      - name: Re-Prune Rolling Window After Recovery Export
        if: ${{ env.RECOVERY_FROM != '' }}
        run: python -m app.maintenance prune --db state/grandarena.db --keep-days 5

      - name: Verify cumulative totals not empty
        run: |
          python - <<'PY'
          import gzip
          import json
          import sys

          p = "exports/data/cumulative/current_totals.json.gz"
          with gzip.open(p, "rt", encoding="utf-8") as f:
              rows = json.load(f)

          count = len(rows) if isinstance(rows, list) else -1
          print(f"current_totals_count={count}")
          if count <= 0:
              print("ERROR: cumulative/current_totals.json.gz is empty")
              sys.exit(1)
          PY

      - name: Validate Feed Window Before Deploy
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          out_dir = Path("exports/data")
          latest = json.loads((out_dir / "latest.json").read_text(encoding="utf-8"))
          status = json.loads((out_dir / "status.json").read_text(encoding="utf-8"))

          days = int(latest.get("window_days", 0))
          lookahead_days = int(latest.get("lookahead_days", -1))
          available_dates = list(latest.get("available_dates") or [])
          partitions = list(latest.get("partitions") or [])
          raw_dates = list(status.get("raw_dates") or [])

          if days != 30:
              raise SystemExit(f"unexpected window_days: {days}")
          if lookahead_days != 2:
              raise SystemExit(f"unexpected lookahead_days: {lookahead_days}")
          if not available_dates:
              raise SystemExit("available_dates is empty")
          if available_dates != raw_dates:
              raise SystemExit("latest.json available_dates does not match status.json raw_dates")
          if len(partitions) != len(available_dates):
              raise SystemExit("partition count does not match available_dates count")

          today = datetime.now(timezone.utc).date()
          expected_start = (today - timedelta(days=29)).isoformat()
          expected_end = (today + timedelta(days=2)).isoformat()
          if available_dates[0] != expected_start:
              raise SystemExit(f"unexpected first available date: {available_dates[0]} != {expected_start}")
          if available_dates[-1] != expected_end:
              raise SystemExit(f"unexpected last available date: {available_dates[-1]} != {expected_end}")
          if status.get("window_start") != expected_start:
              raise SystemExit(f"unexpected status window_start: {status.get('window_start')} != {expected_start}")
          if status.get("window_end") != expected_end:
              raise SystemExit(f"unexpected status window_end: {status.get('window_end')} != {expected_end}")

          missing_files = []
          for partition in partitions:
              rel = partition.get("url")
              if not rel:
                  raise SystemExit("partition missing url")
              if not (out_dir / rel).exists():
                  missing_files.append(rel)
          if missing_files:
              raise SystemExit(f"missing partition files: {missing_files[:5]}")

          current_totals = out_dir / "cumulative" / "current_totals.json.gz"
          if not current_totals.exists():
              raise SystemExit("missing cumulative/current_totals.json.gz")

          latest_run = status.get("latest_ingestion_run") or {}
          if latest_run and latest_run.get("status") not in {"success", "running"}:
              raise SystemExit(f"unexpected latest ingestion status: {latest_run.get('status')}")

          print("feed_window_validation=ok")
          PY

      - name: Pack DB State
        run: gzip -f state/grandarena.db

      - name: Upload DB State Artifact
        uses: actions/upload-artifact@v6
        with:
          name: grandarena-db-state
          path: state/grandarena.db.gz
          retention-days: 90
          overwrite: true

      - name: Upload Feed State Artifact
        uses: actions/upload-artifact@v6
        with:
          name: grandarena-feed-state
          path: exports/data
          retention-days: 90
          overwrite: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exports

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
