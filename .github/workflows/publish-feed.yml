name: Publish Data Feed

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: publish-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GRANDARENA_API_KEY: ${{ secrets.GRANDARENA_API_KEY }}
      SEED_DB_URL: ${{ secrets.SEED_DB_URL }}
      GRANDARENA_DB_PATH: state/grandarena.db
      FETCH_MATCH_PERFORMANCES: "true"
      LOOKBEHIND_DAYS: "3"
      LOOKAHEAD_DAYS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create Work Dirs
        run: mkdir -p state exports

      - name: Restore Prior DB Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: publish-feed.yml
          workflow_conclusion: success
          name: grandarena-db-state
          path: state
          if_no_artifact_found: warn

      - name: Unpack DB State
        run: |
          if [ -f state/grandarena.db.gz ]; then
            gunzip -f state/grandarena.db.gz
          fi

      - name: Seed DB If Missing
        run: |
          if [ ! -f state/grandarena.db ] && [ -n "${SEED_DB_URL:-}" ]; then
            echo "No prior artifact found. Seeding from SEED_DB_URL..."
            curl -fL "$SEED_DB_URL" -o state/seed.db.download
            if gzip -t state/seed.db.download 2>/dev/null; then
              gunzip -c state/seed.db.download > state/grandarena.db
            else
              mv state/seed.db.download state/grandarena.db
            fi
          fi

      - name: Bootstrap DB If Missing
        run: |
          if [ ! -f state/grandarena.db ]; then
            FROM_DATE="$(date -u -d '2 days ago' +%F)"
            TO_DATE="$(date -u +%F)"
            python -m app.ingest backfill --db state/grandarena.db --from "$FROM_DATE" --to "$TO_DATE"
          fi

      - name: Hourly Ingest
        run: python -m app.ingest hourly --db state/grandarena.db

      - name: Prune Rolling Window
        run: python -m app.maintenance prune --db state/grandarena.db --keep-days 7

      - name: Export Static Feed
        run: >
          python -m app.export_feed
          --db state/grandarena.db
          --out exports/data
          --days 7
          --lookahead-days 1
          --mutable-days-back 3
          --mutable-days-forward 1
          --cumulative-mutable-days-back 3

      - name: Verify cumulative totals not empty
        run: |
          python - <<'PY'
          import gzip
          import json
          import sys

          p = "exports/data/cumulative/current_totals.json.gz"
          with gzip.open(p, "rt", encoding="utf-8") as f:
              rows = json.load(f)

          count = len(rows) if isinstance(rows, list) else -1
          print(f"current_totals_count={count}")
          if count <= 0:
              print("ERROR: cumulative/current_totals.json.gz is empty")
              sys.exit(1)
          PY

      - name: Pack DB State
        run: gzip -f state/grandarena.db

      - name: Upload DB State Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grandarena-db-state
          path: state/grandarena.db.gz
          retention-days: 90
          overwrite: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exports

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
